apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
replicas: 6
selector: 
  matchLabels:
    labels:
      app: backend
  spec:
    containers:
      - name: backend
        image: 
        ports:
          - containerPort: 8000
       envFrom:
         - secretRef:
             name: backend-secrets
         - configMapRef:
              name: backend-config
       readinessProbe:
          httpGet:
             path: /health
             port: 8000
           initialDelaySeconds:
           periodSeconds:
           failureThresold:
         livenessProbe:
         
