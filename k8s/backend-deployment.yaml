apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
replicas: 6
selector: 
  matchLabels:
    labels:
      app: backend
  spec:
    containers:
      - name: backend
        image: emmanu1467/backend:latest
        ports:
          - containerPort: 8000
       envFrom:
         - secretRef:
             name: backend-secrets
         - configMapRef:
              name: backend-config
       readinessProbe:
          httpGet:
             path: /health
             port: 8000
           initialDelaySeconds: 13
           periodSeconds: 13
           failureThresold: 5
         livenessProbe:
           httpGet:
             path: /health
             port: 8000
           initialDelaySeconds: 33
           periodSeconds: 23
           failureThresold: 7
           resources:
             requests:
               cpu: 260m
               memory: 515Mi
             limits:
               cpu: 2
               memory: 2Gi
       restartPolicy: Always
